name: Quality

on:
  push:
    branches:
      - master
  pull_request:

jobs:
  quality-checks:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup CMake
        uses: jwlawson/actions-setup-cmake@v2

      - name: Setup Ninja
        uses: seanmiddleditch/gha-setup-ninja@v5

      - name: Setup LLVM (clang-format, clang-tidy)
        uses: KyleMayes/install-llvm-action@v2
        with:
          version: "18"

      - name: Configure
        run: cmake --preset windows-debug

      - name: Format check
        run: cmake --build --preset windows-format-check

      - name: Lint
        run: cmake --build --preset windows-lint

      # Python analogue of clang-format/clang-tidy for the repo's Python
      # surface (all of scripts/: fleet automation + render/perf/gui harnesses).
      # Pinned so the gate is stable across ruff releases; ruff.toml at the repo
      # root pins the rules + the extension-less file set.
      - name: Python lint (ruff)
        uses: astral-sh/ruff-action@v3
        with:
          version: "0.15.20"
          args: "check scripts/"

      # Cross-line pattern ruff has no native rule for: an st_mtime freshness
      # read on the scout cache (must derive from generated_at instead; #2231/
      # #2267). Best-effort ratchet — legit reads opt out with an inline
      # `# lint: state-mtime-ok` comment. Pure-Python, runs on the Windows runner.
      - name: State-mtime freshness lint (best-effort ratchet)
        run: python scripts/fleet/lint_state_mtime.py scripts/fleet/

      - name: Build tests
        run: cmake --build --preset windows-tests

      - name: Run tests
        run: ctest --preset windows-default-tests

  linux-build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            gcc-13 g++-13 cmake ninja-build pkg-config \
            libgl1-mesa-dev libglu1-mesa-dev xorg-dev \
            libwayland-dev libxkbcommon-dev wayland-protocols \
            libasound2-dev libpulse-dev libjack-jackd2-dev \
            libavcodec-dev libavformat-dev libavutil-dev libswscale-dev \
            libavdevice-dev libavfilter-dev

      - name: Configure
        run: cmake --preset linux-debug

      - name: Build tests
        run: cmake --build --preset linux-tests --parallel

      - name: Run tests
        run: ctest --preset linux-default-tests

      - name: Build smoke target (IRShapeDebug)
        run: cmake --build build --target IRShapeDebug -j $(nproc)
